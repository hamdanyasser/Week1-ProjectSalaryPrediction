services:
  - type: web
    name: payscope-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: APP_ENV
        value: production
      - key: LOG_LEVEL
        value: INFO
      - key: DATASET_PATH
        value: data/raw/ds_salaries.csv
      - key: PROCESSED_DATA_PATH
        value: data/processed/cleaned_salaries.csv
      - key: MODEL_PATH
        value: artifacts/decision_tree_pipeline.joblib
      - key: METRICS_PATH
        value: artifacts/model_metrics.json
      - key: REQUEST_TIMEOUT_SECONDS
        value: "10"
      - key: OLLAMA_TIMEOUT_SECONDS
        value: "60"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_PREDICTIONS_TABLE
        value: salary_predictions
